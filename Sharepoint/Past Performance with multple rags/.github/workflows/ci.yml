name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/sharepoint-rag-api
  IMAGE_INDEXER: ${{ github.repository }}/sharepoint-rag-indexer

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SharePointRag.sln

      - name: Build
        run: dotnet build SharePointRag.sln -c Release --no-restore

      - name: Test
        run: dotnet test SharePointRag.sln -c Release --no-build --verbosity normal

  # ── Docker Build & Push ───────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build & push Indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.indexer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_INDEXER }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_INDEXER }}:${{ github.sha }}
