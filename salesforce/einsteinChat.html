<template>
    <section class="chat-shell">
        <header class="chat-header">
            <h2>Salesforce SOQL Agents</h2>
            <p>Accounts · Opportunities · Contracts</p>
        </header>

        <div class="chat-body">
            <template for:each={uiMessages} for:item="msg">
                <div key={msg.id} class={msg.cssClass}>
                    <pre>{msg.text}</pre>
                </div>
            </template>
        </div>

        <template lwc:if={errorMessage}>
            <div class="error">{errorMessage}</div>
        </template>

        <footer class="chat-input">
            <textarea
                value={inputValue}
                oninput={handleInput}
                onkeydown={handleKeyDown}
                placeholder="Ask in natural language, e.g. 'show top 5 opportunities closing this month'">
            </textarea>
            <button onclick={sendMessage} disabled={sendDisabled}>Send</button>
        </footer>
    </section>
</template>
