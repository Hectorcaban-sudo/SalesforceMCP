<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Einstein AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sf-blue:        #0176d3;
      --sf-blue-dark:   #014486;
      --sf-blue-light:  #d8edff;
      --sf-navy:        #032d60;
      --sf-cloud:       #f3f3f3;
      --sf-border:      #dddbda;
      --sf-border-dark: #c9c7c5;
      --sf-text:        #181818;
      --sf-text-mid:    #3e3e3c;
      --sf-text-light:  #706e6b;
      --sf-white:       #ffffff;
      --sf-success:     #2e844a;
      --sf-einstein:    #9c27b0;
      --sf-shadow-sm:   0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
      --sf-shadow-md:   0 4px 12px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.08);
      --sf-font:        'Inter', sans-serif;
    }
    html, body, #root { height: 100%; font-family: var(--sf-font); background: var(--sf-cloud); color: var(--sf-text); overflow: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--sf-border-dark); border-radius: 3px; }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%           { transform: scale(1.0); opacity: 1; }
    }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--sf-text-light); animation: dotBounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ── Helpers ──────────────────────────────────────────────────────────────
    const fmt = d => d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    function makeChatMessage(role, text) {
      return { role: { value: role }, contents: [{ $type: 'TextContent', text }] };
    }

    function extractText(msg) {
      return (msg.contents || []).map(c => c.text || '').join('');
    }

    // ── Icons ─────────────────────────────────────────────────────────────────
    const EinsteinIcon = ({ size = 22 }) => (
      <svg fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24" width={size} height={size}>
        <path strokeLinecap="round" strokeLinejoin="round"
          d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
      </svg>
    );

    const SendIcon = () => (
      <svg fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24" width="15" height="15">
        <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    );

    const ClearIcon = () => (
      <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14">
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
        <path d="M10 11v6M14 11v6" />
      </svg>
    );

    const AlertIcon = () => (
      <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14">
        <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
    );

    // ── Typing Dots ──────────────────────────────────────────────────────────
    const TypingDots = () => (
      <div style={{ display: 'flex', gap: 4, alignItems: 'center', padding: '2px 0' }}>
        <span className="dot" /><span className="dot" /><span className="dot" />
      </div>
    );

    // ── Message ──────────────────────────────────────────────────────────────
    const Message = ({ msg }) => {
      const isUser = msg.role === 'user';
      return (
        <div style={{
          display: 'flex', gap: 8,
          flexDirection: isUser ? 'row-reverse' : 'row',
          animation: 'msgIn 0.2s ease-out both',
        }}>
          <div style={{
            width: 32, height: 32, borderRadius: '50%', flexShrink: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: '0.7rem', fontWeight: 700, marginTop: 2, color: '#fff',
            background: isUser
              ? 'linear-gradient(135deg,#0176d3,#032d60)'
              : 'linear-gradient(135deg,#9c27b0,#673ab7)',
          }}>
            {isUser ? 'JD' : 'AI'}
          </div>
          <div style={{
            maxWidth: '72%', display: 'flex', flexDirection: 'column',
            gap: 3, alignItems: isUser ? 'flex-end' : 'flex-start',
          }}>
            <span style={{ fontSize: '0.6875rem', fontWeight: 600, color: 'var(--sf-text-light)' }}>
              {isUser ? 'John Doe' : 'Einstein'}
            </span>
            <div style={{
              padding: '8px 12px',
              borderRadius: isUser ? '0.5rem 0.5rem 4px 0.5rem' : '0.5rem 0.5rem 0.5rem 4px',
              fontSize: '0.8125rem', lineHeight: 1.55, wordBreak: 'break-word',
              boxShadow: 'var(--sf-shadow-sm)',
              background: isUser ? 'var(--sf-blue)' : 'var(--sf-white)',
              color: isUser ? '#fff' : 'var(--sf-text)',
              border: isUser ? 'none' : '1px solid var(--sf-border)',
            }}>
              {msg.typing ? <TypingDots /> : msg.text.split('\n').map((line, i, arr) => (
                <span key={i}>{line}{i < arr.length - 1 && <br />}</span>
              ))}
            </div>
            {!msg.typing && (
              <span style={{ fontSize: '0.625rem', color: 'var(--sf-text-light)' }}>
                {fmt(msg.timestamp)}
              </span>
            )}
          </div>
        </div>
      );
    };

    // ── Chip ─────────────────────────────────────────────────────────────────
    const Chip = ({ label, onClick }) => {
      const [hov, setHov] = useState(false);
      return (
        <button onClick={() => onClick(label)}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{
            background: hov ? 'var(--sf-blue-light)' : 'var(--sf-white)',
            border: '1px solid var(--sf-blue)', color: 'var(--sf-blue)',
            fontSize: '0.75rem', fontWeight: 600, padding: '4px 12px',
            borderRadius: '1rem', cursor: 'pointer', fontFamily: 'var(--sf-font)',
            transition: 'background 0.15s',
          }}>
          {label}
        </button>
      );
    };

    // ── Welcome ──────────────────────────────────────────────────────────────
    const SUGGESTIONS = [
      'Summarize my open cases', "What's in my pipeline?",
      'Draft a follow-up email', 'Show top opportunities',
    ];

    const Welcome = ({ onSend }) => (
      <div style={{
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', flex: 1, gap: 16,
        textAlign: 'center', padding: 32, animation: 'fadeIn 0.4s ease-out',
      }}>
        <div style={{
          width: 64, height: 64, borderRadius: '50%',
          background: 'linear-gradient(135deg,#9c27b0,#673ab7)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 4px 20px rgba(156,39,176,0.35)',
        }}>
          <EinsteinIcon size={36} />
        </div>
        <h2 style={{ fontSize: '1.25rem', fontWeight: 700 }}>Hi, I'm Einstein</h2>
        <p style={{ fontSize: '0.8125rem', color: 'var(--sf-text-light)', maxWidth: 320, lineHeight: 1.6 }}>
          Your AI-powered assistant. Ask me anything or start with a suggestion below.
        </p>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center' }}>
          {SUGGESTIONS.map(s => <Chip key={s} label={s} onClick={onSend} />)}
        </div>
      </div>
    );

    // ── NavBar ───────────────────────────────────────────────────────────────
    const NavBar = () => (
      <nav style={{
        background: 'var(--sf-navy)', height: 52, display: 'flex',
        alignItems: 'center', padding: '0 1rem', gap: 12, flexShrink: 0,
        boxShadow: '0 2px 4px rgba(0,0,0,0.3)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: '#fff', fontWeight: 700, fontSize: '1.05rem' }}>
          <svg viewBox="0 0 52 34" fill="none" width="28" height="28">
            <path d="M11.5 5.5C13.7 2.9 17 1.3 20.7 1.3c5.3 0 9.9 3.2 12 7.8 2.1-.9 4.4-1.4 6.8-1.4 9.1 0 16.5 7.3 16.5 16.2S48.6 40 39.5 40H3C-4.2 40-10 34.3-10 27.2c0-6.2 4.3-11.4 10.1-12.8-.6-1.4-.9-2.9-.9-4.5 0-6.3 5.1-11.4 11.5-11.4 1 0 1.9.1 2.8.4z"
              fill="white" transform="scale(0.54) translate(10,0)" />
          </svg>
          Salesforce
        </div>
        <div style={{ width: 1, height: 24, background: 'rgba(255,255,255,0.2)' }} />
        <span style={{ color: 'rgba(255,255,255,0.85)', fontSize: '0.875rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.02em' }}>
          Einstein AI
        </span>
        <div style={{ flex: 1 }} />
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: 'linear-gradient(135deg,#0176d3,#032d60)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: '#fff', fontSize: '0.75rem', fontWeight: 700,
          border: '2px solid rgba(255,255,255,0.3)',
        }}>JD</div>
      </nav>
    );

    // ── PageHeader ───────────────────────────────────────────────────────────
    const PageHeader = () => (
      <div style={{
        background: 'var(--sf-white)', borderBottom: '1px solid var(--sf-border)',
        padding: '10px 24px', display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0,
      }}>
        <div style={{
          width: 40, height: 40, borderRadius: 4,
          background: 'linear-gradient(135deg,#9c27b0,#673ab7)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <EinsteinIcon size={22} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: '0.6875rem', color: 'var(--sf-text-light)', textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600 }}>Agentforce</div>
          <div style={{ fontSize: '1.125rem', fontWeight: 700 }}>Einstein AI Assistant</div>
        </div>
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 5,
          background: '#e8f5e9', color: 'var(--sf-success)',
          fontSize: '0.6875rem', fontWeight: 700,
          padding: '3px 10px', borderRadius: '1rem', textTransform: 'uppercase',
        }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--sf-success)' }} />
          Online
        </span>
      </div>
    );

    // ── InputPanel ───────────────────────────────────────────────────────────
    const InputPanel = ({ onSend, disabled }) => {
      const [value, setValue] = useState('');
      const ref = useRef(null);

      const handleInput = e => {
        setValue(e.target.value);
        ref.current.style.height = 'auto';
        ref.current.style.height = Math.min(ref.current.scrollHeight, 120) + 'px';
      };

      const submit = () => {
        const text = value.trim();
        if (!text || disabled) return;
        onSend(text);
        setValue('');
        if (ref.current) ref.current.style.height = 'auto';
      };

      const handleKey = e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
      };

      const [hov, setHov] = useState(false);
      const canSend = !disabled && value.trim().length > 0;

      return (
        <div style={{
          background: 'var(--sf-white)', border: '1px solid var(--sf-border)',
          borderRadius: '0.5rem', boxShadow: 'var(--sf-shadow-md)', overflow: 'hidden',
        }}>
          {/* Toolbar */}
          <div style={{ display: 'flex', alignItems: 'center', padding: '4px 10px', borderBottom: '1px solid var(--sf-border)', gap: 4 }}>
            <span style={{ fontSize: '0.7rem', color: 'var(--sf-text-light)', fontWeight: 500 }}>Ask Einstein</span>
            <div style={{ flex: 1 }} />
            <button onClick={() => onSend(null)} title="Clear conversation"
              onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
              style={{
                width: 28, height: 28, border: 'none', background: hov ? 'var(--sf-cloud)' : 'none',
                borderRadius: '0.25rem', display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', color: 'var(--sf-text-light)',
              }}>
              <ClearIcon />
            </button>
          </div>

          {/* Input row */}
          <div style={{ display: 'flex', alignItems: 'flex-end', padding: '8px 10px', gap: 8 }}>
            <textarea ref={ref} value={value} onChange={handleInput} onKeyDown={handleKey}
              placeholder="Ask Einstein anything…" rows={1}
              style={{
                flex: 1, border: 'none', outline: 'none', resize: 'none',
                fontFamily: 'var(--sf-font)', fontSize: '0.8125rem',
                color: 'var(--sf-text)', lineHeight: 1.5,
                background: 'transparent', minHeight: 20, maxHeight: 120, overflowY: 'auto',
              }} />
            <button onClick={submit} disabled={!canSend} title="Send"
              style={{
                width: 32, height: 32, borderRadius: '50%', border: 'none',
                background: canSend ? 'var(--sf-blue)' : 'var(--sf-border-dark)',
                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: canSend ? 'pointer' : 'not-allowed', flexShrink: 0,
                boxShadow: 'var(--sf-shadow-sm)', transition: 'background 0.15s',
              }}>
              <SendIcon />
            </button>
          </div>

          {/* Footer */}
          <div style={{
            padding: '4px 10px', fontSize: '0.6rem', color: 'var(--sf-text-light)',
            borderTop: '1px solid var(--sf-border)', display: 'flex', alignItems: 'center', gap: 4,
          }}>
            <span style={{ color: 'var(--sf-einstein)' }}>★</span>
            Powered by Einstein AI · Responses may not always be accurate
          </div>
        </div>
      );
    };

    // ── App ───────────────────────────────────────────────────────────────────
    const App = () => {
      const [history, setHistory] = useState([]);   // server-shaped ChatMessage list
      const [uiMsgs,  setUiMsgs]  = useState([]);   // display messages
      const [loading, setLoading] = useState(false);
      const [error,   setError]   = useState(null);
      const endRef                = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [uiMsgs]);

      const send = useCallback(async text => {
        // null = clear
        if (text === null) { setHistory([]); setUiMsgs([]); setError(null); return; }

        const newHistory = [...history, makeChatMessage('user', text)];

        setUiMsgs(prev => [
          ...prev,
          { role: 'user',      text,       timestamp: new Date() },
          { role: 'assistant', typing: true, timestamp: new Date() },
        ]);
        setHistory(newHistory);
        setLoading(true);
        setError(null);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newHistory),
          });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || `HTTP ${res.status}`);
          }

          const updated   = await res.json();
          const replyText = extractText(updated[updated.length - 1]);

          setHistory(updated);
          setUiMsgs(prev => [
            ...prev.filter(m => !m.typing),
            { role: 'assistant', text: replyText, timestamp: new Date() },
          ]);
        } catch (err) {
          setUiMsgs(prev => prev.filter(m => !m.typing));
          setError(err.message || 'Could not reach Einstein. Please try again.');
        } finally {
          setLoading(false);
        }
      }, [history]);

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
          <NavBar />
          <PageHeader />

          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '1rem 1.5rem', gap: 12 }}>
            {/* Messages */}
            <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 12 }}>
              {uiMsgs.length === 0
                ? <Welcome onSend={send} />
                : uiMsgs.map((msg, i) => <Message key={i} msg={msg} />)
              }
              <div ref={endRef} />
            </div>

            {/* Error */}
            {error && (
              <div style={{
                background: '#fef0f0', border: '1px solid #fcc', color: '#c23934',
                fontSize: '0.75rem', padding: '8px 12px', borderRadius: '0.25rem',
                display: 'flex', alignItems: 'center', gap: 6,
              }}>
                <AlertIcon />{error}
              </div>
            )}

            <InputPanel onSend={send} disabled={loading} />
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
