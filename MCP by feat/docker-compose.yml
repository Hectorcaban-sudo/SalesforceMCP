version: "3.9"

services:
  mcp-server:
    build: .
    ports:
      - "5000:8080"
    environment:
      - Salesforce__ClientId=${SF_CLIENT_ID}
      - Salesforce__ClientSecret=${SF_CLIENT_SECRET}
      - Salesforce__Username=${SF_USERNAME}
      - Salesforce__Password=${SF_PASSWORD}
      - Salesforce__SecurityToken=${SF_SECURITY_TOKEN}
      - Salesforce__IsSandbox=${SF_IS_SANDBOX:-false}
      - Schema__SchemaDirectory=/app/schemas
    volumes:
      - ./schemas:/app/schemas:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger"]
      interval: 30s
      timeout: 10s
      retries: 3
